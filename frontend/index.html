<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeoneer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d18;
      --sidebar-bg:   #111122;
      --surface:      #181830;
      --surface-2:    #1e1e38;
      --border:       #2a2a4a;
      --gold:         #c9a84c;
      --gold-dim:     #7a6330;
      --text:         #ddd8c8;
      --text-dim:     #888;
      --user-bg:      #1a2235;
      --dm-bg:        #1c1830;
      --pill-hover:   #1a1a35;
      --pill-active:  #1e1e3a;
      --danger:       #c0392b;
      --phase-colors: #4a9e6b; /* story green */
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 17px;
      line-height: 1.6;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */

    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-title {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #new-btn {
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #new-btn:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--gold);
    }

    #campaign-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #campaign-list::-webkit-scrollbar { width: 4px; }
    #campaign-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .campaign-pill {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .campaign-pill:hover { background: var(--pill-hover); }

    .campaign-pill.active {
      background: var(--pill-active);
      border-left-color: var(--gold);
    }

    .pill-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .campaign-pill.active .pill-name { color: var(--gold); }

    .pill-meta {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
    }

    .pill-phase {
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
      font-size: 10px;
    }

    .phase-setting   { color: #8888cc; }
    .phase-creation  { color: #cc9944; }
    .phase-story     { color: #44aa77; }
    .phase-combat    { color: #cc4444; }

    /* ── Main area ───────────────────────────────────────────────────────── */

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--sidebar-bg);
      min-height: 54px;
    }

    #chat-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    #phase-badge {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid currentColor;
    }

    /* ── Messages ────────────────────────────────────────────────────────── */

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      max-width: 820px;
      width: 100%;
      border-radius: 8px;
      padding: 14px 18px;
      line-height: 1.65;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .message.assistant {
      background: var(--dm-bg);
      border: 1px solid var(--border);
      align-self: flex-start;
    }

    .message.user {
      background: var(--user-bg);
      border: 1px solid #2a3555;
      align-self: flex-end;
      font-style: italic;
      color: #b8c8e8;
    }

    .message-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .message.assistant .message-label { color: var(--gold-dim); }
    .message.user      .message-label { color: #4a6aaa; }

    /* Thinking indicator */
    .message.thinking .message-content {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-style: italic;
    }

    .dots span {
      display: inline-block;
      animation: bounce 1.2s infinite;
      font-size: 20px;
      line-height: 1;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Markdown styles inside messages ─────────────────────────────────── */

    .message-content h1,
    .message-content h2,
    .message-content h3 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      margin: 12px 0 6px;
      font-weight: 600;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }

    .message-content h1 { font-size: 1.3em; }
    .message-content h2 { font-size: 1.15em; }
    .message-content h3 { font-size: 1em; }

    .message-content p { margin-bottom: 8px; }
    .message-content p:last-child { margin-bottom: 0; }

    .message-content strong { color: #e8dfc0; font-weight: 600; }
    .message-content em     { color: #c8c0a8; }

    .message-content ul,
    .message-content ol {
      margin: 6px 0 6px 20px;
    }

    .message-content li { margin-bottom: 3px; }

    .message-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      color: #b8d4b8;
    }

    .message-content pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .message-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85em;
    }

    .message-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .message-content blockquote {
      border-left: 3px solid var(--gold-dim);
      padding-left: 12px;
      color: #a0988a;
      font-style: italic;
      margin: 8px 0;
    }

    .message-content a { color: var(--gold); }

    /* ── Welcome / empty states ──────────────────────────────────────────── */

    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }

    #welcome .welcome-icon {
      font-size: 52px;
      opacity: 0.4;
    }

    #welcome h2 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
    }

    #welcome p { font-size: 15px; max-width: 340px; }

    /* ── Input bar ───────────────────────────────────────────────────────── */

    #input-bar {
      border-top: 1px solid var(--border);
      background: var(--sidebar-bg);
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 16px;
      line-height: 1.5;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 140px;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: var(--gold-dim); }
    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      height: 44px;
      padding: 0 20px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── No-campaign state ───────────────────────────────────────────────── */

    #no-campaign {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }

    #no-campaign .nc-icon { font-size: 64px; opacity: 0.25; }

    #no-campaign h2 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--gold-dim);
    }

    #no-campaign p { font-size: 15px; max-width: 320px; line-height: 1.6; }

    #nc-start-btn {
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #nc-start-btn:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--gold);
    }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title">⚔ DUNGEONEER</div>
    <button id="new-btn" onclick="newCampaign()">+ New Campaign</button>
  </div>
  <div id="campaign-list"></div>
</aside>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Header -->
  <div id="chat-header">
    <span id="chat-title">Select a campaign</span>
    <span id="phase-badge" style="display:none"></span>
  </div>

  <!-- No-campaign splash -->
  <div id="no-campaign">
    <div class="nc-icon">🏰</div>
    <h2>No Campaign Selected</h2>
    <p>Start a new adventure or select an existing campaign from the list.</p>
    <button id="nc-start-btn" onclick="newCampaign()">Begin a New Campaign</button>
  </div>

  <!-- Chat view (hidden until campaign selected) -->
  <div id="chat-messages" style="display:none"></div>

  <!-- Input bar (hidden until campaign selected) -->
  <div id="input-bar" style="display:none">
    <textarea id="user-input" placeholder="What do you do?" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────

  let activeCampaignId = null;
  let campaigns = {};       // id -> summary
  let messages = {};        // id -> [{role, content, timestamp}]
  let sending = false;

  const API = '';  // same origin

  // ── Boot ───────────────────────────────────────────────────────────────────

  async function boot() {
    try {
      const list = await apiFetch('/api/campaigns');
      list.forEach(c => { campaigns[c.id] = c; });
      renderSidebar();
    } catch (e) {
      console.error('Failed to load campaigns:', e);
    }
  }

  // ── API helpers ────────────────────────────────────────────────────────────

  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || res.statusText);
    }
    return res.json();
  }

  // ── Campaign actions ────────────────────────────────────────────────────────

  async function newCampaign() {
    try {
      const data = await apiFetch('/api/campaigns', { method: 'POST' });
      campaigns[data.id] = data;
      messages[data.id] = data.messages || [];
      renderSidebar();
      await selectCampaign(data.id, /* already loaded */ true);
    } catch (e) {
      alert('Could not create campaign: ' + e.message);
    }
  }

  async function selectCampaign(id, messagesLoaded = false) {
    activeCampaignId = id;
    renderSidebar();

    if (!messagesLoaded) {
      try {
        messages[id] = await apiFetch(`/api/campaigns/${id}/messages`);
      } catch (e) {
        messages[id] = [];
      }
    }

    showChatView();
    renderMessages();
    scrollBottom();
    document.getElementById('user-input').focus();
  }

  async function sendMessage() {
    if (sending || !activeCampaignId) return;
    const input = document.getElementById('user-input');
    const content = input.value.trim();
    if (!content) return;

    sending = true;
    setSendDisabled(true);
    input.value = '';
    autoResize(input);

    // Optimistic user message
    const userMsg = { role: 'user', content, timestamp: new Date().toISOString() };
    messages[activeCampaignId].push(userMsg);
    renderMessages();

    // Thinking indicator
    const thinkingId = addThinking();
    scrollBottom();

    try {
      const data = await apiFetch(`/api/campaigns/${activeCampaignId}/message`, {
        method: 'POST',
        body: JSON.stringify({ content }),
      });

      removeThinking(thinkingId);
      const assistantMsg = { role: 'assistant', content: data.content, timestamp: new Date().toISOString() };
      messages[activeCampaignId].push(assistantMsg);

      // Update campaign summary
      if (data.campaign) {
        campaigns[activeCampaignId] = data.campaign;
        renderSidebar();
      }

      renderMessages();
      scrollBottom();
    } catch (e) {
      removeThinking(thinkingId);
      // Remove optimistic user message
      messages[activeCampaignId].pop();
      renderMessages();
      const errMsg = { role: 'assistant', content: `⚠ *Error: ${e.message}*`, timestamp: new Date().toISOString() };
      messages[activeCampaignId].push(errMsg);
      renderMessages();
      scrollBottom();
    } finally {
      sending = false;
      setSendDisabled(false);
      input.focus();
    }
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function renderSidebar() {
    const list = document.getElementById('campaign-list');
    const sorted = Object.values(campaigns).sort((a, b) =>
      new Date(a.created_at) - new Date(b.created_at)
    );

    list.innerHTML = sorted.map(c => {
      const isActive = c.id === activeCampaignId;
      const phaseLabel = phaseText(c.phase);
      const phaseClass = 'phase-' + c.phase;
      const date = new Date(c.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      return `
        <div class="campaign-pill${isActive ? ' active' : ''}" onclick="selectCampaign('${c.id}')">
          <div class="pill-name">${escHtml(c.name)}</div>
          <div class="pill-meta">
            <span class="pill-phase ${phaseClass}">${phaseLabel}</span>
            <span>${date}</span>
            <span>${c.message_count} msg${c.message_count !== 1 ? 's' : ''}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderMessages() {
    const id = activeCampaignId;
    if (!id) return;
    const container = document.getElementById('chat-messages');
    const msgs = messages[id] || [];

    container.innerHTML = msgs.map(m => {
      const label = m.role === 'user' ? 'YOU' : 'DUNGEON MASTER';
      const html = m.role === 'assistant'
        ? DOMPurify.sanitize(marked.parse(m.content))
        : escHtml(m.content).replace(/\n/g, '<br>');
      return `
        <div class="message ${m.role}">
          <div class="message-label">${label}</div>
          <div class="message-content">${html}</div>
        </div>
      `;
    }).join('');

    // Update header
    const campaign = campaigns[id];
    if (campaign) {
      document.getElementById('chat-title').textContent = campaign.name;
      const badge = document.getElementById('phase-badge');
      badge.textContent = phaseText(campaign.phase).toUpperCase();
      badge.className = 'phase-badge phase-' + campaign.phase;
      badge.style.display = '';
    }
  }

  function showChatView() {
    document.getElementById('no-campaign').style.display = 'none';
    document.getElementById('chat-messages').style.display = 'flex';
    document.getElementById('input-bar').style.display = 'flex';
  }

  function addThinking() {
    const id = 'thinking-' + Date.now();
    const container = document.getElementById('chat-messages');
    const el = document.createElement('div');
    el.id = id;
    el.className = 'message assistant thinking';
    el.innerHTML = `
      <div class="message-label">DUNGEON MASTER</div>
      <div class="message-content">
        <span class="dots"><span>•</span><span>•</span><span>•</span></span>
      </div>
    `;
    container.appendChild(el);
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollBottom() {
    const c = document.getElementById('chat-messages');
    requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
  }

  // ── Input handling ─────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('user-input');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => autoResize(input));
    boot();
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function setSendDisabled(disabled) {
    document.getElementById('send-btn').disabled = disabled;
  }

  // ── Utilities ──────────────────────────────────────────────────────────────

  function phaseText(phase) {
    return { setting: 'Setup', creation: 'Creating', story: 'Story', combat: 'Combat' }[phase] || phase;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });
</script>
</body>
</html>
